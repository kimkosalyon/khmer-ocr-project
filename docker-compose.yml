services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "15005:5000"
    volumes:
      - ./mlruns:/mlflow
    environment:
      - MLFLOW_SERVER_CORS_ALLOWED_ORIGINS=*
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:///mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts

  renderer:
    build:
      context: ./renderer
      dockerfile: Dockerfile
    ports:
      - "3456:3456"
    volumes:
      - ./renderer/fonts:/app/fonts:ro
